<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Zine — 免费技能分享</title>
<style>
/* ── Lo-Fi Anchor: paper-yellow, mixed system fonts, rotated elements, halftone, riso misregistration ── */

:root {
  --paper: #E8E0C0;
  --paper-alt: #EDE4CF;
  --ink: #1A1A1A;
  --ink-dim: #555;
  --staple: #777;
  --riso-red: #FF006E;
  --riso-cyan: #00FFCC;
  --dot: #CCC0A0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: "Times New Roman", Times, serif;
  min-height: 100vh;
  /* Grain overlay via SVG filter */
  position: relative;
}

/* ── Grain texture ── */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
}

/* ── Halftone dot pattern (subtle) ── */
.halftone-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.03;
  background: radial-gradient(circle, var(--ink) 1px, transparent 1px);
  background-size: 12px 12px;
}

/* ── Header / Hero ── */
header {
  position: relative;
  z-index: 1;
  padding: 60px 24px 40px;
  text-align: center;
  border-bottom: 3px double var(--ink);
  margin-bottom: 0;
}

/* Risograph misregistration on title */
.hero-title {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 8px;
  position: relative;
  display: inline-block;
  /* Riso offset: red and cyan ghosts */
  text-shadow:
    3px 0 var(--riso-red),
    -3px 0 var(--riso-cyan);
}

.hero-sub {
  font-family: "Courier New", Courier, monospace;
  font-size: 14px;
  color: var(--ink-dim);
  transform: rotate(-1.5deg);
  display: inline-block;
  margin-top: 8px;
  border: 1px solid var(--ink-dim);
  padding: 4px 12px;
}

/* ── Hero badges (stars, visitors) ── */
.hero-badges {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  transform: rotate(0.5deg);
}

.hero-badge-img {
  height: 20px;
  opacity: 0.7;
  filter: grayscale(0.3);
}

.visitor-counter {
  font-family: "Courier New", Courier, monospace;
  font-size: 12px;
  color: var(--ink-dim);
  border: 1px solid var(--ink-dim);
  padding: 2px 10px;
  white-space: nowrap;
}

/* ── Search bar ── */
.search-wrap {
  max-width: 600px;
  margin: 32px auto 0;
  position: relative;
  transform: rotate(0.8deg);
}

.search-input {
  width: 100%;
  padding: 14px 20px 14px 44px;
  font-family: "Courier New", Courier, monospace;
  font-size: 16px;
  background: var(--paper-alt);
  border: 2px solid var(--ink);
  color: var(--ink);
  outline: none;
}

.search-input:focus {
  background: var(--paper);
}

.search-input::placeholder {
  color: #999;
  font-style: italic;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 18px;
  color: var(--ink-dim);
}

/* ── Filters ── */
.filters {
  max-width: 600px;
  margin: 16px auto 0;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  transform: rotate(-0.5deg);
}

.filter-btn {
  font-family: "Courier New", Courier, monospace;
  font-size: 12px;
  padding: 4px 12px;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.15s;
}

.filter-btn:hover,
.filter-btn.active {
  background: var(--ink);
  color: var(--paper);
}

/* ── Platform tabs (bookmark style) ── */
.platform-tabs {
  max-width: 600px;
  margin: 24px auto 0;
  display: flex;
  gap: 0;
  justify-content: center;
  transform: rotate(0.3deg);
}

.platform-tab {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 20px 8px;
  background: transparent;
  color: var(--ink-dim);
  border: 2px solid var(--ink-dim);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  position: relative;
  margin: 0 -2px;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}

.platform-tab:hover {
  color: var(--ink);
  border-color: var(--ink);
  z-index: 2;
}

.platform-tab.active {
  color: var(--ink);
  background: var(--paper);
  border-color: var(--ink);
  z-index: 3;
  padding-bottom: 12px;
  margin-bottom: -4px;
}

.platform-tab::after {
  content: attr(data-count);
  font-family: "Courier New", Courier, monospace;
  font-size: 10px;
  font-weight: 400;
  margin-left: 6px;
  color: var(--ink-dim);
}

.platform-tab.active::after {
  color: var(--ink);
}

/* ── Platform badges on cards ── */
.platform-badges {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
}

.platform-badge {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 2px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.platform-badge.codex { background: #002FA7; color: #fff; }
.platform-badge.zcode { background: var(--ink); color: var(--paper); }
.platform-badge.claude-code { background: #E07B39; color: #fff; }

/* ── Stats bar ── */
.stats-bar {
  max-width: 600px;
  margin: 20px auto 0;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--ink-dim);
  text-align: center;
  border-top: 1px solid var(--ink-dim);
  border-bottom: 1px solid var(--ink-dim);
  padding: 8px 0;
}

/* ── Skill cards grid ── */
main {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 40px auto 80px;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 28px;
}

/* ── Card ── */
.card {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 24px 20px 20px;
  position: relative;
  transition: transform 0.2s;
}

/* Each card slightly rotated */
.card:nth-child(3n+1) { transform: rotate(-1.2deg); }
.card:nth-child(3n+2) { transform: rotate(0.6deg); }
.card:nth-child(3n+3) { transform: rotate(-0.4deg); }
.card:nth-child(5n+4) { transform: rotate(1.5deg); }

.card:hover {
  transform: rotate(0deg) translateY(-4px);
  z-index: 2;
}

/* Staple marks on card */
.card::before {
  content: "";
  position: absolute;
  top: -6px;
  left: 16px;
  width: 16px;
  height: 4px;
  background: var(--staple);
  border-radius: 1px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

/* Tear edge at bottom */
.card::after {
  content: "";
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 6px;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 6px,
    var(--paper) 6px,
    var(--paper) 10px
  );
}

.card-name {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 20px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 6px;
  word-break: break-word;
}

.card-author {
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  color: var(--ink-dim);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-desc {
  font-family: "Times New Roman", Times, serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 14px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.tag {
  font-family: "Courier New", Courier, monospace;
  font-size: 10px;
  padding: 2px 8px;
  border: 1px solid var(--ink-dim);
  color: var(--ink-dim);
}

.tag.premium {
  background: var(--ink);
  color: var(--paper);
}

.card-meta {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 11px;
  color: var(--ink-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px dashed var(--dot);
  padding-top: 12px;
}

.card-price {
  font-family: "Courier New", Courier, monospace;
  font-weight: 700;
  font-size: 13px;
}

.card-price.free { color: var(--ink-dim); }
.card-price.paid { color: var(--ink); }

.install-cmd {
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  background: var(--ink);
  color: var(--paper);
  padding: 4px 8px;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
}

.install-cmd:hover { opacity: 0.85; }

/* ── Loading / Empty ── */
.loading, .empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 24px;
  font-family: "Courier New", Courier, monospace;
  font-size: 14px;
  color: var(--ink-dim);
  transform: rotate(-1deg);
}

/* ── Footer ── */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 32px 24px;
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  color: var(--ink-dim);
  border-top: 3px double var(--ink);
}

.footer-staple {
  display: inline-block;
  margin: 0 12px;
  width: 20px;
  height: 5px;
  background: var(--staple);
  border-radius: 1px;
  vertical-align: middle;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) rotate(-1deg);
  z-index: 1000;
  font-family: "Courier New", Courier, monospace;
  font-size: 13px;
  background: var(--ink);
  color: var(--paper);
  padding: 12px 24px;
  border: 2px solid var(--ink);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  pointer-events: auto;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header { padding: 40px 16px 28px; }
  main { gap: 20px; padding: 0 16px; }
  .card { padding: 16px 14px 14px; }
  .hero-title { font-size: 40px; }
}
</style>
</head>
<body>
<div class="halftone-bg"></div>

<header>
  <h1 class="hero-title">Skill Zine</h1>
  <div class="hero-sub">ISSUE #1 — JUNE 2026 — FREE</div>
  <div class="hero-badges" id="heroBadges">
    <img class="hero-badge-img" src="https://img.shields.io/github/stars/zhangyi7710-L11A5/skill-zine?style=flat&color=1A1A1A" alt="stars" onerror="this.style.display='none'">
    <span class="visitor-counter" id="visitorCount">⋯ visitors</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Search skills, tags, authors…"
      autocomplete="off"
    >
  </div>

  <div class="platform-tabs" id="platformTabs">
    <button class="platform-tab active" data-platform="" data-count="47">All Agents</button>
    <button class="platform-tab" data-platform="codex" data-count="47">Codex</button>
    <button class="platform-tab" data-platform="zcode" data-count="47">ZCode</button>
    <button class="platform-tab" data-platform="claude-code" data-count="27">Claude Code</button>
  </div>

  <div class="filters" id="filters"></div>

  <div class="stats-bar" id="statsBar">Loading…</div>
</header>

<main id="skillGrid"></main>

<footer>
  <span class="footer-staple"></span>
  Skill Zine — a community catalog for AI coding skills
  <span class="footer-staple"></span>
  <br>
  <span style="font-size:10px;opacity:0.6;">
    Install with <code style="background:var(--ink);color:var(--paper);padding:1px 4px;">smcli install &lt;name&gt;</code>
  </span>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── Registry data ──
// Works with both: local API (Node server) and GitHub Pages (direct JSON fetch)
const API_BASE = window.location.hostname === "localhost"
  ? "http://localhost:3456"
  : "";

let allSkills = [];
let categories = new Set();

async function fetchSkills() {
  try {
    let data;
    if (API_BASE) {
      // Local dev: use the Node API
      const resp = await fetch(`${API_BASE}/api/skills`);
      data = await resp.json();
    } else {
      // GitHub Pages / static: load registry.json directly
      const resp = await fetch("registry.json");
      data = await resp.json();
    }

    allSkills = data.skills || [];

    // Collect categories
    categories.clear();
    allSkills.forEach(s => {
      if (s.category) categories.add(s.category);
    });

    renderFilters();
    updatePlatformCounts();
    renderCards(allSkills);
    updateStats(allSkills.length);
  } catch (err) {
    document.getElementById("skillGrid").innerHTML =
      `<div class="empty">Could not load skill registry.<br><small>${err.message}</small></div>`;
    document.getElementById("statsBar").textContent = "Offline";
  }
}

// ── Render ──
function renderFilters() {
  const container = document.getElementById("filters");
  let html = '<button class="filter-btn active" data-category="">All</button>';
  [...categories].sort().forEach(cat => {
    html += `<button class="filter-btn" data-category="${cat}">${cat}</button>`;
  });
  container.innerHTML = html;

  // Bind clicks
  container.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterAndSearch();
    });
  });
}

function updatePlatformCounts() {
  const tabs = document.querySelectorAll(".platform-tab");
  tabs.forEach(tab => {
    const platform = tab.dataset.platform;
    if (!platform) {
      tab.setAttribute("data-count", allSkills.length);
      return;
    }
    const count = allSkills.filter(s => (s.platforms || []).includes(platform)).length;
    tab.setAttribute("data-count", count);
  });
}

function filterAndSearch() {
  const query = document.getElementById("searchInput").value.toLowerCase().trim();
  const activeCategory = document.querySelector(".filter-btn.active");
  const category = activeCategory ? activeCategory.dataset.category : "";
  const activePlatform = document.querySelector(".platform-tab.active");
  const platform = activePlatform ? activePlatform.dataset.platform : "";

  let filtered = allSkills;

  if (platform) {
    filtered = filtered.filter(s => (s.platforms || []).includes(platform));
  }

  if (category) {
    filtered = filtered.filter(s => s.category === category);
  }

  if (query) {
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(query) ||
      (s.display_name || "").toLowerCase().includes(query) ||
      s.description.toLowerCase().includes(query) ||
      (s.tags || []).some(t => t.toLowerCase().includes(query))
    );
  }

  renderCards(filtered);
  updateStats(filtered.length);
}

function updateStats(count) {
  document.getElementById("statsBar").textContent =
    `${count} skill${count !== 1 ? "s" : ""} found — photocopied ${new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}`;
}

function renderCards(skills) {
  const grid = document.getElementById("skillGrid");

  if (skills.length === 0) {
    grid.innerHTML = '<div class="empty">No skills match. Try a different search.</div>';
    return;
  }

  grid.innerHTML = skills.map(s => {
    const free = s.pricing && s.pricing.type === "free";
    const tags = (s.tags || []).map(t =>
      `<span class="tag${t === "premium" ? " premium" : ""}">${t}</span>`
    ).join("");
    const priceLabel = free
      ? '<span class="card-price free">FREE</span>'
      : `<span class="card-price paid">$${s.pricing.price_usd}/${s.pricing.billing_cycle || "mo"}</span>`;

    // Platform badges
    const platforms = s.platforms || [];
    const platformLabels = { "codex": "Codex", "zcode": "ZCode", "claude-code": "Claude" };
    const platformBadges = platforms.map(p =>
      `<span class="platform-badge ${p}">${platformLabels[p] || p}</span>`
    ).join("");

    return `
      <div class="card">
        <div class="card-name">${escapeHtml(s.display_name || s.name)}</div>
        <div class="card-author">${escapeHtml(s.author || "unknown")} &nbsp;·&nbsp; v${escapeHtml(s.version || "1.0.0")}</div>
        <div class="platform-badges">${platformBadges}</div>
        <div class="card-desc">${escapeHtml(s.description || "")}</div>
        <div class="card-tags">${tags}</div>
        <div class="card-meta">
          ${priceLabel}
          <button class="install-cmd" data-name="${escapeHtml(s.name)}" ${!free ? "disabled" : ""}>
            ${free ? "Copy install" : "Purchase →"}
          </button>
        </div>
      </div>
    `;
  }).join("");

  // Bind install buttons
  grid.querySelectorAll(".install-cmd").forEach(btn => {
    btn.addEventListener("click", () => {
      const name = btn.dataset.name;
      const cmd = `smcli install ${name}`;
      navigator.clipboard.writeText(cmd).then(() => {
        showToast(`Copied: ${cmd}`);
      }).catch(() => {
        showToast(`Run: ${cmd}`);
      });
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

// ── Visitor counter ──
async function fetchVisitorCount() {
  try {
    const resp = await fetch("https://api.countapi.xyz/hit/skill-zine/visits");
    const data = await resp.json();
    document.getElementById("visitorCount").textContent = `${data.value} visitors`;
  } catch (e) {
    document.getElementById("visitorCount").textContent = "⋯ visitors";
  }
}

// ── Init ──
document.getElementById("searchInput").addEventListener("input", filterAndSearch);
document.querySelectorAll(".platform-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".platform-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    filterAndSearch();
  });
});
fetchSkills();
fetchVisitorCount();
</script>
</body>
</html>
